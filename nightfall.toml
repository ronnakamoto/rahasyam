#
# The development section of this file is used by the integration tests. Take care editing it or you may break the tests
# Select a configuration by setting the environment variable NF4_RUN_MODE to the desired section name, e.g. NF4_RUN_MODE="production"
#

[development]
signing_key = "Key not set" #key (0)
azure_vault_url = "vault url is not set"
azure_key_name = "key name not set"
log_app_only = true
test_x509_certificates = true
mock_prover = false
genesis_block = 0
ethereum_client_url = "ws://anvil:8545"
# RPC rate limit (calls per second). 0 = unlimited.
# For Alchemy free tier: ~8 calls/sec (500 CU/s ÷ 60 CU per eth_getLogs call).
# Override via env var NF4_RPC_RATE_LIMIT.
rpc_rate_limit = 0
configuration_url = "http://configuration:80" # The name of the proposer config to use can be overridden by env var NF4_PROPOSER_CONFIG


[development.network]
chain_id = 31337 # Anvil chain id = 31337

[development.nightfall_client]
url = "http://client:3000"
log_level = "info"
wallet_type = "local"
db_url = "mongodb://nf4_db_client:27017"
max_event_listener_attempts = 10
webhook_url = "http://172.18.0.250:8080/webhook" # The webhook URL for the client to send notifications to the propose
max_queue_size = 1000

[development.nightfall_proposer]
url = "http://proposer:3000"
log_level = "info"
wallet_type = "local"
db_url = "mongodb://nf4_db_proposer:27017"
block_assembly_max_wait_secs = 120
block_assembly_target_fill_ratio = 0.01
block_assembly_initial_interval_secs = 15
max_event_listener_attempts = 10
block_size = 64
# Must stay false: the client/proposer merkle tree uses sub_tree_height=3
# (sub-tree capacity 8), so blocks must contain a multiple of 8 commitments
# (== 2 transactions). The Nightfall contract enforces block_transactions_length
# in {64, 256} and the proposer pads up to block_size (64) when needed.
nova_dynamic_block_size = true

[development.nightfall_proposer.proving_system]
# Per-transaction (client) proofs default to Barretenberg UltraHonk on the Nova
# rollup path (requires the ultra-honk-v1 build feature and the ultrahonk_sidecar
# Node prover). The rollup itself is still proved with Nova, so `nova-v1` (and
# `nova-bls-v1` for the committee dual-gate) stay enabled for the on-chain rollup
# verifier. To revert client proofs to Nova, set `active = "nova-v1"`.
active = "ultra-honk-v1"
# `nova-bls-v1` (id 3) is deployed alongside `nova-v1` (id 2) for the dual-gate.
# The proposer only USES the committee when `nova_verifier.committee_threshold > 0`
# (default 0 => ECDSA single-attestor path, unchanged). Activate the committee by
# setting `NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD=2` and starting the `committee`
# compose profile (attestor2/attestor3).
enabled = ["nova-v1", "nova-bls-v1", "ultra-honk-v1"]

