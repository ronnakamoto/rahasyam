# --- BLS attestor committee (plan B3, opt-in) -----------------------------
# Deterministic dev keyset: cargo run -p lib --features nova-bls \
#   --example bls_committee_keygen -- 3 deterministic
# committee_threshold = 0 keeps the proposer on the single-attestor ECDSA path
# (no behavioural change). Set to 2 (e.g. NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD)
# to route attestation through the t-of-N committee. The committee_verifier
# address is auto-propagated from deployment (addresses.toml); members are
# listed in on-chain registry order (bitmap bit i -> pubkeys[i]).
