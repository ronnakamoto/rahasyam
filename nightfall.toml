[production]
# This is the production environment - add an appropriate configuration here, using development as a template

# -----------------------------------------------------------------------------
# [local] — fast-iteration profile for host-built binaries + Docker infra ring.
# Select with `NF4_RUN_MODE=local`. The proposer and client run on the host
# (no Docker image rebuild on source change); MongoDB and anvil are Docker
# containers (see docker-compose.dev-infra.yml). Block-assembly is tightened
# and `nova_dynamic_block_size = true` so a single-tx block can be proposed
# without waiting for 64-tx padding. The on-chain `block_transactions_length`
# guard in Nightfall.sol is bypassed by the local-only `MockNightfall` the
# deployer scripts install when `NF4_RUN_MODE=local`.
# -----------------------------------------------------------------------------
[local]
signing_key = "Key not set"
azure_vault_url = ""
azure_key_name = ""
log_app_only = true
test_x509_certificates = true
mock_prover = false
genesis_block = 0
ethereum_client_url = "http://localhost:8545"
configuration_url = ""
rpc_rate_limit = 0

[local.network]
chain_id = 31337

[local.nightfall_client]
url = "http://localhost:3000"
log_level = "info"
wallet_type = "local"
db_url = "mongodb://localhost:27017"
max_event_listener_attempts = 10
webhook_url = ""
max_queue_size = 1000

[local.nightfall_proposer]
url = "http://localhost:3001"
log_level = "info"
wallet_type = "local"
db_url = "mongodb://localhost:27017"
block_assembly_max_wait_secs = 10
block_assembly_target_fill_ratio = 0.01
block_assembly_initial_interval_secs = 2
max_event_listener_attempts = 10
block_size = 64
# The local deployer installs a `MockNightfall` that does NOT enforce
# `block_transactions_length == 64 || 256`, so we can propose with as
# few as 1 transaction and iterate fast. Do NOT enable this in
# [development] / [base_sepolia] / [production] — the real on-chain
# Nightfall.sol would revert.
nova_dynamic_block_size = true

[local.nightfall_proposer.proving_system]
# Per-transaction (client) proofs default to Barretenberg UltraHonk on the Nova
# rollup path (requires the ultra-honk-v1 build feature and the ultrahonk_sidecar
# Node prover). The rollup is still proved with Nova, so `nova-v1` stays enabled
# for the on-chain rollup verifier. To revert client proofs to Nova, set
# `active = "nova-v1"`.
active = "ultra-honk-v1"
enabled = ["nova-v1", "ultra-honk-v1"]

