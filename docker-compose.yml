services:
  client:
    container_name: nf4_client
    stop_grace_period: 3s
    profiles:
      - client
      - development
      - sync_test
      - no_test
    build:
      dockerfile: nightfall_client/Dockerfile
      context: .

    stdin_open: true # keep stdin open, so we can print things in docker compose up
    # platform: linux/amd64 # Commented out: client does Plonk proving (no solc); build native arm64 on Apple Silicon (matches proposer/attestor).
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      db_client:
        condition: service_healthy
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
      proposer:
        condition: service_healthy
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - RUST_LOG=${RUST_LOG:-info}
      - NF4_NETWORK__LOG_CHUNK_SIZE=${NF4_NETWORK__LOG_CHUNK_SIZE:-}
      - NF4_SIGNING_KEY=${CLIENT_SIGNING_KEY}
      - NF4_NIGHTFALL_CLIENT__DB_URL=mongodb://nf4_db_client:27017
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - AZURE_KEY_NAME=${CLIENT_SIGNING_KEY_NAME}
      - CLIENT_SIGNING_KEY_NAME=${CLIENT_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
    deploy:
      resources:
        limits:
          memory: 8G

  indie-client:
    container_name: nf4_indie_client
    stop_grace_period: 3s
    profiles:
      - indie-client
    build:
      dockerfile: nightfall_client/Dockerfile
      context: .
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    platform: linux/amd64 # Required for building on M1 Macs
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      db_client:
        condition: service_healthy
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-base_sepolia}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - NF4_SIGNING_KEY=${CLIENT_SIGNING_KEY}
      - NF4_NIGHTFALL_CLIENT__DB_URL=mongodb://nf4_db_client:27017
      - NF4_ETHEREUM_CLIENT_URL
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-false}
      - NF4_NIGHTFALL_PROPOSER__URL=${NF4_NIGHTFALL_PROPOSER__URL:-localhost:3001}
    deploy:
      resources:
        limits:
          memory: 12G

  client2:
    container_name: nf4_client2
    stop_grace_period: 3s
    profiles:
      - client
      - sync_test
      - development
      - no_test
    build:
      dockerfile: nightfall_client/Dockerfile
      context: .
    # command: ["tail", "-f","/dev/null"] # For debugging if required
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    # platform: linux/amd64 # Commented out: client2 does Plonk proving (no solc); build native arm64 on Apple Silicon (matches proposer/attestor).
    ports:
      - "3002:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      db_client2:
        condition: service_healthy
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
      proposer:
        condition: service_healthy
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - NF4_SIGNING_KEY=${CLIENT2_SIGNING_KEY}
      - NF4_NIGHTFALL_CLIENT__DB_URL=mongodb://nf4_db_client2:27017
      - NF4_NIGHTFALL_CLIENT__LOG_LEVEL=info # Mostly the client2 logs are a repeat of client1 logs, so we can reduce the log level to error
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - AZURE_KEY_NAME=${CLIENT_SIGNING_KEY_NAME}
      - CLIENT_SIGNING_KEY_NAME=${CLIENT2_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - WEBHOOK_URL=${WEBHOOK_URL}
  attestor:
    container_name: nf4_attestor
    stop_grace_period: 3s
    profiles:
      - proposer
      - development
      - sync_test
      - no_test
    build:
      dockerfile: nightfall_attestor/Dockerfile
      context: .
    # platform: linux/amd64 # Build native on Apple Silicon (links lib's nova-v1 deps).
    ports:
      - "3004:3001"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/v1/health" ]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      # The attestor now runs the sound `CompressedSNARK::verify` before
      # signing, so it needs the same pre-generated Nova public params +
      # Spartan verifying key the proposer uses. Mounted read-only: the
      # keys are pre-generated on the host and must match the proposer's
      # byte-for-byte (a mismatched VK would make verification fail).
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - RUST_LOG=${RUST_LOG:-info}
      # Point the Nova key loader at the mounted, pre-generated key cache
      # (same value the proposer uses) so the attestor loads — rather than
      # regenerates — the public params + Spartan VK for verification.
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      # The attestation service signs with nova_verifier.attestor_key
      # (from nightfall.toml). It holds NO transaction-sending key.
      # BLS committee member 0 key (dev deterministic keyset). Inert unless the
      # committee verifier is deployed AND the proposer's committee_threshold>0.
      - NF4_NOVA_VERIFIER__BLS_SECRET_KEY=${ATTESTOR0_BLS_SK:-0x07ac62fff1c1fa60f7fc960a9b50282c95c31f7ce5fb8b8c816602c7fab36c8c}
    deploy:
      resources:
        limits:
          # Must hold the deserialized Nova public params + Spartan VK
          # (~100 MB on disk, larger in memory) plus the verify working
          # set. Higher than the previous 2 GB, which only covered the
          # Stage-1 structural-only signer. Tune down if headroom allows.
          memory: 8G

  # --- BLS committee members 1 & 2 (opt-in `committee` profile) -------------
  # Start alongside the dev stack to run a 2-of-3 committee:
  #   docker compose --profile development --profile committee up
  # Then activate aggregation on the proposer with
  #   NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD=2
  attestor2:
    container_name: nf4_attestor2
    stop_grace_period: 3s
    profiles:
      - committee
    build:
      dockerfile: nightfall_attestor/Dockerfile
      context: .
    ports:
      - "3005:3001"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/v1/health" ]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - RUST_LOG=${RUST_LOG:-info}
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      # BLS committee member 1 key (dev deterministic keyset).
      - NF4_NOVA_VERIFIER__BLS_SECRET_KEY=${ATTESTOR1_BLS_SK:-0x2708164e71627b7e217312ad4c1853d56346304332056a497b8d0f218f904295}
    deploy:
      resources:
        limits:
          memory: 8G

  attestor3:
    container_name: nf4_attestor3
    stop_grace_period: 3s
    profiles:
      - committee
    build:
      dockerfile: nightfall_attestor/Dockerfile
      context: .
    ports:
      - "3006:3001"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/v1/health" ]
      interval: 5s
      timeout: 30s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - RUST_LOG=${RUST_LOG:-info}
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      # BLS committee member 2 key (dev deterministic keyset).
      - NF4_NOVA_VERIFIER__BLS_SECRET_KEY=${ATTESTOR2_BLS_SK:-0x44cfcd8d4dc5e3f74c5773240d4d451a2536b551463b6493bdc81c9e3a579704}
    deploy:
      resources:
        limits:
          memory: 8G

  proposer:
    container_name: nf4_proposer
    stop_grace_period: 3s
    profiles:
      - proposer
      - development
      - sync_test
      - no_test
    build:
      dockerfile: nightfall_proposer/Dockerfile
      context: .
    # platform: linux/amd64 # Commented out: Rosetta emulation makes Nova key deserialization 10+ min. Build native on Apple Silicon.
    ports:
      - "3001:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys
    depends_on:
      db_proposer:
        condition: service_healthy
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
      attestor:
        condition: service_healthy
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Delegate Nova proof attestation to the standalone, independently
      # keyed attestation service (Stage 1 of the decentralised-attestor
      # roadmap). Empty/unset would fall back to local signing with
      # nova_verifier.attestor_key.
      - NF4_NIGHTFALL_ATTESTOR__URL=${NF4_NIGHTFALL_ATTESTOR__URL:-http://attestor:3001}
      # Route attestation through the t-of-N BLS committee when requested
      # (e.g. NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD=2 with the `committee`
      # profile). Defaults to 0, i.e. the single-attestor ECDSA path, so
      # non-committee runs are unchanged. Without this passthrough the proposer
      # only ever sees committee_threshold=0 from nightfall.toml and never
      # aggregates BLS shares, even when the committee verifier is deployed.
      - NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD=${NF4_NOVA_VERIFIER__COMMITTEE_THRESHOLD:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - RUST_LOG=${RUST_LOG:-info}
      - NF4_NETWORK__LOG_CHUNK_SIZE=${NF4_NETWORK__LOG_CHUNK_SIZE:-}
      - NF4_SIGNING_KEY=${PROPOSER_SIGNING_KEY}
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-false} # NovaV1 does not support MockProver
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_MAX_WAIT_SECS=60
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_TARGET_FILL_RATIO=0.05
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_INITIAL_INTERVAL_SECS=5
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - PROPOSER_SIGNING_KEY_NAME=${PROPOSER_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
    deploy:
      resources:
        limits:
          memory: 12G

  indie-proposer:
    container_name: nf4_indie_proposer
    stop_grace_period: 3s
    profiles:
      - indie-proposer
    build:
      dockerfile: nightfall_proposer/Dockerfile
      context: .
    platform: linux/amd64 # Required for building on M1 Macs
    restart: unless-stopped
    ports:
      - "3001:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys
    depends_on:
      db_proposer:
        condition: service_healthy
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-base_sepolia}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - NF4_SIGNING_KEY=${PROPOSER_SIGNING_KEY}
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-false}
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      - NF4_ETHEREUM_CLIENT_URL
      - NF4_CONTRACTS__DEPLOY_CONTRACTS=${NF4_CONTRACTS__DEPLOY_CONTRACTS:-false}

  proposer2:
    container_name: nf4_proposer2
    stop_grace_period: 3s
    profiles:
      - sync_test
    build:
      dockerfile: nightfall_proposer/Dockerfile
      context: .
    # platform: linux/amd64 # Commented out: Rosetta emulation makes Nova key deserialization 10+ min. Build native on Apple Silicon.
    ports:
      - "3003:3000"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/v1/health" ]
      interval: 5s
      timeout: 90s
      retries: 10
      start_period: 0s
    networks:
      - nightfall_network
    volumes:
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys
    depends_on:
      db_proposer2:
        condition: service_healthy
      test:
        condition: service_completed_successfully
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - NF4_SIGNING_KEY=${PROPOSER_2_SIGNING_KEY}
      - NF4_PROPOSER_CONFIG=nightfall_proposer2
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-true}
      - NF4_NOVA_KEY_DIR=/app/configuration/bin/nova_keys
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_MAX_WAIT_SECS=60
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_TARGET_FILL_RATIO=0.05
      - NF4_NIGHTFALL_PROPOSER__BLOCK_ASSEMBLY_INITIAL_INTERVAL_SECS=5
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - PROPOSER_SIGNING_KEY_NAME=${PROPOSER_2_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - NF4_NIGHTFALL_PROPOSER__URL=http://proposer2:3000
      - NF4_NIGHTFALL_PROPOSER__DB_URL=mongodb://nf4_db_proposer2:27017
    deploy:
      resources:
        limits:
          memory: 12G

  db_client:
    container_name: nf4_db_client
    stop_grace_period: 3s
    profiles:
      - client
      - indie-client
      - development
      - sync_test
      - no_test
    image: mongo:8.0
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet || exit 1
      interval: 10s
      timeout: 90s
      retries: 10
      start_period: 0s
    command: mongod --quiet --logpath /dev/null
    ports:
      - "27017:27017"
    networks:
      - nightfall_network
    #  volumes:
    #    - mongodb_client_data:/data/db
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}

  db_client2:
    container_name: nf4_db_client2
    stop_grace_period: 3s
    profiles:
      - client
      - sync_test
      - development
      - no_test
    image: mongo:8.0
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet || exit 1
      interval: 10s
      timeout: 90s
      retries: 10
      start_period: 0s
    command: mongod --quiet --logpath /dev/null
    ports:
      - "27020:27017"
    networks:
      - nightfall_network
    #  volumes:
    #    - mongodb_client2_data:/data/db
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}

  db_proposer:
    container_name: nf4_db_proposer
    stop_grace_period: 3s
    profiles:
      - proposer
      - indie-proposer # We'll reuse the db_proposer for the indie-proposer as this will never run at the same time as the proposer
      - development
      - sync_test
      - no_test
    image: mongo:8.0
    restart: unless-stopped
    ports:
      - "27018:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet || exit 1
      interval: 10s
      timeout: 90s
      retries: 10
      start_period: 0s
    command: mongod --quiet --logpath /dev/null
    networks:
      - nightfall_network
    #  volumes:
    #    - mongodb_proposer_data:/data/db
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}

  db_proposer2:
    container_name: nf4_db_proposer2
    stop_grace_period: 3s
    profiles:
      - sync_test
    image: mongo:8.0
    ports:
      - "27019:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet || exit 1
      interval: 10s
      timeout: 90s
      retries: 10
      start_period: 0s
    command: mongod --quiet --logpath /dev/null
    networks:
      - nightfall_network
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}

  deployer:
    container_name: nf4_deployer
    stop_grace_period: 3s
    profiles:
      - deployer
      - development
      - sync_test
      - no_test
    build:
      dockerfile: nightfall_deployer/Dockerfile
      context: .
      ulimits:
        nofile:
          soft: 65536
          hard: 65536
    platform: linux/amd64 # Required for building on M1 Macs
    # command: ["tail", "-f","/dev/null"] # For debugging if required
    networks:
      - nightfall_network
    volumes:
      - ./blockchain_assets/test_contracts:/test_contracts
      - ./blockchain_assets/logs:/app/blockchain_assets/logs # to be able to see deployed contract addresses locally
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: false
      - ./configuration/bin/keys:/app/configuration/bin/keys:ro
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    depends_on:
      anvil:
        condition: service_healthy
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - NF4_CONTRACTS__DEPLOY_CONTRACTS=${NF4_CONTRACTS__DEPLOY_CONTRACTS:-true}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - NF4_SIGNING_KEY=${DEPLOYER_SIGNING_KEY}
      - CLIENT_ADDRESS=${CLIENT_ADDRESS}
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-true}
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - DEPLOYER_SIGNING_KEY_NAME=${DEPLOYER_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}

  indie-deployer:
    container_name: nf4_indie_deployer
    stop_grace_period: 3s
    profiles:
      - indie-deployer
    build:
      dockerfile: nightfall_deployer/Dockerfile
      context: .
    platform: linux/amd64 # Required for building on M1 Macs
    # command: ["tail", "-f","/dev/null"] # For debugging if required
    networks:
      - nightfall_network
    volumes:
      - ./blockchain_assets/test_contracts:/test_contracts
      - ./blockchain_assets/logs:/app/blockchain_assets/logs # to be able to see deployed contract addresses locally
      - type: volume
        source: key_data
        target: /app/configuration/bin/keys
        read_only: false
      - type: volume
        source: toml_data
        target: /app/configuration/toml
        read_only: false
      - ./configuration/bin/nova_keys:/app/configuration/bin/nova_keys:ro
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-base_sepolia}
      - NF4_CONTRACTS__DEPLOY_CONTRACTS=${NF4_CONTRACTS__DEPLOY_CONTRACTS:-true}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      - NF4_SIGNING_KEY=${DEPLOYER_SIGNING_KEY}
      - CLIENT_ADDRESS=${CLIENT_ADDRESS}
      - NF4_MOCK_PROVER=${NF4_MOCK_PROVER:-false}
      - NF4_ETHEREUM_CLIENT_URL

  configuration:
    container_name: nf4_configuration
    stop_grace_period: 3s
    profiles:
      - configuration
      - development
      - sync_test
      - no_test
    build:
      dockerfile: configuration/Dockerfile
      context: .
    # restart: unless-stopped
    # ports:
    #   - "8080:80"     replace with a port that is exposed for configuration service if required
    platform: linux/amd64 # Required for building on M1 Macs
    volumes:
      - type: volume
        source: toml_data
        target: /var/www/html/configuration/toml
        read_only: true
      - type: volume
        source: key_data
        target: /var/www/html/configuration/bin/keys
        read_only: true
    networks:
      - nightfall_network
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - NGINX_ENTRYPOINT_QUIET_LOGS=1

  anvil:
    container_name: anvil
    stop_grace_period: 3s
    profiles:
      - development
      - sync_test
      - anvil
      - no_test
    build:
      dockerfile: anvil/Dockerfile
      context: .
    platform: linux/amd64 # Required for building on M1 Macs
    healthcheck:
      test: [ "CMD", "curl", "-H", "Content-Type:", "application/json", "-X", "POST", "--data", '{"jsonrpc":"2.0","method":"web3_clientVersion","params":[],"id":67}', "0.0.0.0:8545" ]
      interval: 10s
      timeout: 90s
      retries: 10
      start_period: 0s
    volumes:
      - ./blockchain_assets/logs:/blockchain_assets/logs # to be able to see deployed contract addresses locally
    networks:
      - nightfall_network
    ports:
      - "8545:8545"
    environment:
      - NF4_SIGNING_KEY=${DEPLOYER_SIGNING_KEY}
    deploy:
      resources:
        limits:
          memory: 2G

  test:
    container_name: nf4_test
    stop_grace_period: 3s
    profiles:
      - development
      - sync_test
      - no_deployment
    build:
      dockerfile: nightfall_test/Dockerfile
      context: .
    platform: linux/amd64 # Required for building on M1 Macs
    # command: ["tail", "-f","/dev/null"] # For debugging if required
    volumes:
      - ./blockchain_assets/logs:/app/blockchain_assets/logs # to be able to see deployed contract addresses locally
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true
    # Give the test container a static IP address so it can be contacted by the clients' webhooks. It doesn't get added to the dns with 'docker compose run test'
    networks:
      nightfall_network:
        ipv4_address: 172.18.0.250
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - NF4_SIGNING_KEY=${DEPLOYER_SIGNING_KEY}
      - NF4_CONTRACTS__DEPLOY_CONTRACTS=${NF4_CONTRACTS__DEPLOY_CONTRACTS:-true}
      - CLIENT_ADDRESS=${CLIENT_ADDRESS}
      - NF4_LARGE_BLOCK_TEST=${NF4_LARGE_BLOCK_TEST:-false} # Set to true to run large block tests
      - AZURE_VAULT_URL=${AZURE_VAULT_URL}
      - AZURE_KEY_NAME=${CLIENT_SIGNING_KEY_NAME}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}

    depends_on:
      client:
        condition: service_healthy
      client2:
        condition: service_healthy
      proposer:
        condition: service_healthy

  sync_test:
    container_name: nf4_sync_test
    stop_grace_period: 3s
    profiles:
      - sync_test
    build:
      dockerfile: nightfall_sync_test/Dockerfile
      context: .
    volumes:
      - ./blockchain_assets/logs:/app/blockchain_assets/logs # to be able to see deployed contract addresses locally
      - type: volume
        source: address_data
        target: /app/configuration/toml
        read_only: true

    platform: linux/amd64 # Required for building on M1 Macs
    networks:
      - nightfall_network
    stdin_open: true # keep stdin open, so we can print things in docker compose up
    tty: true # required for logs to print in colour
    environment:
      - NF4_RUN_MODE=${NF4_RUN_MODE:-development}
      - RUST_BACKTRACE=${RUST_BACKTRACE:-0}
      # Cap rayon parallelism. The arkworks / jf-plonk parallel FFTs and
      # permutation polynomials each hold their own working buffer; with
      # 8+ logical CPUs (default in the container) peak RSS during the
      # Plonk recursive prover was exceeding the 8 GiB client cgroup and
      # getting OOM-killed during swap proof generation. With 2 workers
      # transfers fit comfortably (peak ~5 GiB) but the 4-spend + 4-new
      # swap circuit still OOMs at 8 GiB. We force a single worker here
      # to drop the per-thread parallel-FFT buffer duplication; peak RSS
      # drops by ~30-50% on jf-plonk's `split_quotient_polynomial` and
      # `compute_g_poly_and_comm`, which is enough to bring the swap
      # proof under the limit. Single-threaded Plonk proving of a swap
      # takes ~5-6 minutes on this host, which is acceptable for the
      # development profile (the proposer can prove the same circuit
      # in parallel on a separate node in production).
      - RAYON_NUM_THREADS=1
      - NF4_SIGNING_KEY=${DEPLOYER_SIGNING_KEY}
    depends_on:
      proposer:
        condition: service_healthy
      proposer2:
        condition: service_healthy

volumes:
  # mongodb_client_data:
  # mongodb_client2_data:
  # mongodb_proposer_data:
  address_data:
  key_data:
  toml_data:

networks:
  nightfall_network:
    ipam:
      driver: default
      config:
        - subnet: "172.18.0.0/24"
